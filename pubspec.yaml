name: yummy
description: Finance Tracker & Trip Planner app.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  go_router: ^13.0.1
  url_launcher: ^6.2.1
  uuid: ^4.2.1
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  http: ^1.1.0
  chopper: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  build_runner: ^2.4.9
  chopper_generator: ^7.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/categories/
    - assets/trips/
    - assets/activities/
    - assets/finance/
